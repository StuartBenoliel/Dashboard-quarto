<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>MVT Test</title>
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>

<body>
<div id="map"></div>

<script>
var map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      points: {
        type: 'vector',
        tiles: ['tiles/{z}/{x}/{y}.pbf'],
        minzoom: 5,
        maxzoom: 5
      }
    },
    layers: [
      {
        id: 'points-layer',
        type: 'circle',
        source: 'points',
        'source-layer': 'points',
        paint: {
          'circle-radius': 4,
          'circle-color': '#007cbf',
          'circle-opacity': 0.7
        }
      }
    ]
  },
  center: [2.3, 46.8],
  zoom: 5
});
</script>

</body>
</html>
